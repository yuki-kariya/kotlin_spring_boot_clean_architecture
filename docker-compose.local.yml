services:
  app:
    build:
      context: .
      dockerfile: Dockerfile.local
    container_name: kotlin-clean-architecture-app
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://db:3306/app?useSSL=false&allowPublicKeyRetrieval=true&characterEncoding=UTF-8&serverTimezone=UTC
      SPRING_DATASOURCE_USERNAME: app
      SPRING_DATASOURCE_PASSWORD: app
    ports:
      - "8080:8080"
    volumes:
      - .:/workspace
      - gradle-cache:/home/gradle/.gradle

  db:
    image: mysql:8.4
    container_name: kotlin-clean-architecture-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: app
      MYSQL_USER: app
      MYSQL_PASSWORD: app
    ports:
      - "3306:3306"
    volumes:
      - db-data:/var/lib/mysql

volumes:
  db-data:
  gradle-cache:
